name: Publish NPM Package

on:
  push:
    branches: [ main ]
    paths:
      - 'annotations-server/**'
  workflow_dispatch: # Allow manual triggering

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allow pushing commits and tags
      id-token: write  # For NPM publishing
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v5
      with:
        # Fetch full history for proper versioning
        fetch-depth: 0
        # Use GITHUB_TOKEN for checkout
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '22'
        registry-url: 'https://registry.npmjs.org'

    - name: Configure Git
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'

    - name: Install dependencies
      run: |
        cd annotations-server
        npm install

    - name: Get NPM version and publish
      run: |
        cd annotations-server

        # Get latest published version from NPM
        LATEST_NPM_VERSION=$(npm view vibe-annotations-server version 2>/dev/null || echo "0.1.0")
        LOCAL_VERSION=$(node -p "require('./package.json').version")
        echo "Latest NPM version: $LATEST_NPM_VERSION"
        echo "Local version: $LOCAL_VERSION"

        # Use whichever is higher: local package.json or npm latest + patch
        # This lets intentional version bumps (e.g. 0.2.0) take effect
        NPM_PATCH_VERSION=$(npx semver $LATEST_NPM_VERSION -i patch)
        PUBLISH_VERSION=$(npx semver $LOCAL_VERSION $NPM_PATCH_VERSION | tail -1)

        echo "Publishing version: $PUBLISH_VERSION"
        if [ "$LOCAL_VERSION" != "$PUBLISH_VERSION" ]; then
          npm version $PUBLISH_VERSION --no-git-tag-version
        fi

        # Publish to NPM
        npm publish

      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}