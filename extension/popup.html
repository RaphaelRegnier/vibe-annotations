<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #1f2937;
      background: #fff;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 600; }
    .update-banner {
      background: #eff6ff;
      border: 1px solid #3b82f6;
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .update-banner strong { font-size: 12px; color: #1e40af; }
    .update-link {
      font-size: 12px;
      color: #3b82f6;
      text-decoration: none;
      white-space: nowrap;
      font-weight: 500;
    }
    .update-link:hover { text-decoration: underline; }
    .dismiss-btn {
      background: none;
      border: none;
      font-size: 16px;
      color: #6b7280;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .dismiss-btn:hover { color: #1f2937; }
    .message {
      background: #fef3c7;
      border: 1px solid #f59e0b;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .message strong { color: #92400e; }
    .site-url {
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 12px;
      word-break: break-all;
    }
    .action-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #d97757;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
    }
    .action-btn:hover { background: #c4684a; }
    .action-btn:disabled { background: #d1d5db; cursor: default; }
    .action-btn.secondary {
      background: transparent;
      color: #6b7280;
      font-weight: 500;
    }
    .action-btn.secondary:hover { background: #f3f4f6; color: #374151; }
    .success {
      background: #d1fae5;
      border: 1px solid #10b981;
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      line-height: 1.5;
      color: #065f46;
    }
    .separator {
      border-top: 1px solid #e5e7eb;
      margin: 12px 0;
    }
    .supported {
      color: #6b7280;
      font-size: 12px;
      line-height: 1.6;
    }
    .supported strong { color: #374151; font-weight: 500; }
    code {
      background: #f3f4f6;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
    .hidden { display: none !important; }
    @media (prefers-color-scheme: dark) {
      body { background: #1f2937; color: #e5e7eb; }
      .update-banner { background: #1e3a5f; border-color: #3b82f6; }
      .update-banner strong { color: #93c5fd; }
      .update-link { color: #60a5fa; }
      .dismiss-btn { color: #9ca3af; }
      .dismiss-btn:hover { color: #e5e7eb; }
      .message { background: #78350f; border-color: #b45309; }
      .message strong { color: #fde68a; }
      .success { background: #064e3b; border-color: #059669; color: #a7f3d0; }
      .site-url { color: #9ca3af; }
      .supported { color: #9ca3af; }
      .supported strong { color: #d1d5db; }
      .separator { border-color: #374151; }
      code { background: #374151; color: #e5e7eb; }
      .action-btn.secondary { color: #9ca3af; }
      .action-btn.secondary:hover { background: #374151; color: #e5e7eb; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="assets/icons/icon48.png" alt="Vibe Annotations">
    <h1>Vibe Annotations</h1>
  </div>
  <div class="update-banner hidden" id="updateBanner">
    <strong id="updateText"></strong>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="#" id="updateLink" class="update-link" target="_blank" rel="noopener">Learn more</a>
      <button id="updateDismiss" class="dismiss-btn" title="Dismiss">&times;</button>
    </div>
  </div>
  <div class="message hidden" id="message"></div>
  <div class="success hidden" id="success"></div>
  <div class="site-url hidden" id="siteUrl"></div>
  <button class="action-btn hidden" id="mainBtn"></button>
  <button class="action-btn secondary hidden" id="allSitesBtn">Enable for all sites</button>
  <div class="separator"></div>
  <div class="supported">
    <strong>Auto-enabled:</strong><br>
    <code>localhost</code>
    <code>127.0.0.1</code>
    <code>0.0.0.0</code>
    <code>*.local</code>
    <code>*.test</code>
    <code>file://</code>
  </div>

  <script src="popup.js"></script>
</body>
</html>
