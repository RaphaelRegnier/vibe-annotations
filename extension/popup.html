<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: #fcfcfd;
      background: #0f1115;
      padding: 20px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 14px;
    }
    .header img { width: 28px; height: 28px; border-radius: 6px; }
    .header h1 { font-size: 15px; font-weight: 600; color: #fcfcfd; }
    .update-banner {
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.3);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    .update-banner strong { font-size: 12px; color: #93c5fd; }
    .update-link {
      font-size: 12px;
      color: #60a5fa;
      text-decoration: none;
      white-space: nowrap;
      font-weight: 500;
    }
    .update-link:hover { text-decoration: underline; }
    .dismiss-btn {
      background: none;
      border: none;
      font-size: 16px;
      color: #52525b;
      cursor: pointer;
      padding: 0 2px;
      line-height: 1;
    }
    .dismiss-btn:hover { color: #d4d4d8; }
    .message {
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      line-height: 1.5;
    }
    .message strong { color: #fde68a; }
    .site-url {
      font-size: 12px;
      color: #71717a;
      margin-bottom: 12px;
      word-break: break-all;
    }
    .action-btn {
      display: block;
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: linear-gradient(92deg, #E66762 0%, #DA5167 100%);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 10px;
      transition: opacity 0.15s ease;
    }
    .action-btn:hover { opacity: 0.9; }
    .action-btn:disabled { background: #3f3f46; color: #71717a; cursor: default; opacity: 1; }
    .action-btn.secondary {
      background: transparent;
      color: #9AA4B2;
      font-weight: 500;
    }
    .action-btn.secondary:hover { background: rgba(255,255,255,0.05); color: #d4d4d8; opacity: 1; }
    .success {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 14px;
      line-height: 1.5;
      color: #a7f3d0;
    }
    .separator {
      border-top: 1px solid rgba(255,255,255,0.06);
      margin: 12px 0;
    }
    .supported {
      color: #71717a;
      font-size: 12px;
      line-height: 1.6;
    }
    .supported strong { color: #9AA4B2; font-weight: 500; }
    code {
      background: rgba(255,255,255,0.06);
      color: #d4d4d8;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="header">
    <img src="assets/icons/icon48.png" alt="Vibe Annotations">
    <h1>Vibe Annotations</h1>
  </div>
  <div class="update-banner hidden" id="updateBanner">
    <strong id="updateText"></strong>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="#" id="updateLink" class="update-link" target="_blank" rel="noopener">Learn more</a>
      <button id="updateDismiss" class="dismiss-btn" title="Dismiss">&times;</button>
    </div>
  </div>
  <div class="message hidden" id="message"></div>
  <div class="success hidden" id="success"></div>
  <div class="site-url hidden" id="siteUrl"></div>
  <button class="action-btn hidden" id="mainBtn"></button>
  <button class="action-btn secondary hidden" id="allSitesBtn">Enable for all sites</button>
  <div class="separator"></div>
  <div class="supported">
    <strong>Auto-enabled:</strong><br>
    <code>localhost</code>
    <code>127.0.0.1</code>
    <code>0.0.0.0</code>
    <code>*.local</code>
    <code>*.test</code>
    <code>file://</code>
  </div>

  <script src="popup.js"></script>
</body>
</html>
